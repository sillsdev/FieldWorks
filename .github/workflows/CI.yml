name: Flex CI
on:
  push:
    branches: ["release/**", "main", "feature/PubSub"]
  pull_request:
    branches: ["release/**", "main", "feature/PubSub"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug_build_and_test:
    name: Build Debug and run tests
    runs-on: windows-latest
    steps:
      - name: Checkout Files
        uses: actions/checkout@v6
        id: checkout

      - name: Build with tests
        id: build
        shell: powershell
        run: |
          .\build.ps1 -Configuration Debug -BuildTests
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests
        id: test
        shell: powershell
        run: |
          .\test.ps1 -Configuration Debug -NoBuild -TestFilter 'TestCategory!=LongRunning&TestCategory!=ByHand&TestCategory!=SmokeTest&TestCategory!=DesktopRequired'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Summarize native test results
        if: ${{ always() }}
        shell: powershell
        run: |
          .\Build\Agent\Summarize-NativeTestResults.ps1 -Configuration Debug

      - name: Collect render comparison artifacts
        id: render_artifacts
        if: ${{ !cancelled() && failure() }}
        shell: powershell
        run: |
          $result = .\Build\Agent\Collect-RenderArtifacts.ps1 -SearchRoot . -OutputDirectory .\Output\RenderArtifacts
          if ($result.HasArtifacts) {
            Write-Host "::notice title=Render comparison artifacts::$($result.FailureCount) render comparison artifact set(s) collected."
          }
          else {
            Write-Host 'No render comparison artifacts found.'
          }

      - name: Upload render comparison artifacts
        id: upload_render_artifacts
        if: ${{ !cancelled() && steps.render_artifacts.outputs.has_artifacts == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: render-comparison-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: Output/RenderArtifacts
          retention-days: 30
          if-no-files-found: error

      - name: Summarize render comparison artifacts
        if: ${{ !cancelled() && steps.render_artifacts.outputs.has_artifacts == 'true' }}
        shell: powershell
        env:
          ARTIFACT_URL: ${{ steps.upload_render_artifacts.outputs.artifact-url }}
          FAILURE_COUNT: ${{ steps.render_artifacts.outputs.failure_count }}
        run: |
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### Render comparison artifacts'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "$env:FAILURE_COUNT render snapshot failure(s) produced expected, actual, and diff images."
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ''
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "[Download render comparison artifacts]($env:ARTIFACT_URL)"

      - name: Comment render artifact link on PR
        if: ${{ github.event_name == 'pull_request' && !cancelled() && steps.render_artifacts.outputs.has_artifacts == 'true' }}
        uses: actions/github-script@v8
        continue-on-error: true
        env:
          ARTIFACT_URL: ${{ steps.upload_render_artifacts.outputs.artifact-url }}
          FAILURE_COUNT: ${{ steps.render_artifacts.outputs.failure_count }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const marker = '<!-- fieldworks-render-comparison-artifacts -->';
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 12);
            const runLabel = `${context.runId}.${process.env.RUN_ATTEMPT}`;
            const entry = `- [${shortSha} run ${runLabel}](${runUrl}) - ${process.env.FAILURE_COUNT} render snapshot failure(s) - [download artifact](${process.env.ARTIFACT_URL})`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find(comment => comment.user.type === 'Bot' && comment.body && comment.body.includes(marker));
            const previousEntries = previous
              ? previous.body.split('\n').filter(line => line.startsWith('- ['))
              : [];
            const entries = [entry, ...previousEntries.filter(line => !line.includes(`run ${runLabel}`))].slice(0, 25);
            const body = [
              marker,
              '### Render comparison artifacts',
              '',
              'Render snapshot failure artifacts from recent CI runs. Each artifact contains `index.html`, expected images, actual images, diff images, and metadata.',
              '',
              ...entries,
              ''
            ].join('\n');
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Mark render artifacts resolved on PR
        if: ${{ github.event_name == 'pull_request' && success() }}
        uses: actions/github-script@v8
        continue-on-error: true
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        with:
          script: |
            const marker = '<!-- fieldworks-render-comparison-artifacts -->';
            const issue_number = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.substring(0, 12);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find(comment => comment.user.type === 'Bot' && comment.body && comment.body.includes(marker));
            const body = [
              marker,
              '### Render comparison artifacts',
              '',
              'No render snapshot failures were captured in the latest successful CI run.',
              '',
              `Latest run: [${shortSha} run ${context.runId}.${process.env.RUN_ATTEMPT}](${runUrl}).`,
              ''
            ].join('\n');
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            }

      - name: Upload TRX test results (managed)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: trx-results
          path: |
            **/*.trx
          if-no-files-found: warn

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() && failure() }}
        with:
          name: build-logs
          path: |
            ./*.log
            ./Output/**/*.log
            ./Output/**/*.log.stderr

  publish_test_results:
    name: Publish Test Results
    if: ${{ !cancelled() }}
    needs: debug_build_and_test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    steps:
      - name: Download TRX artifacts
        uses: actions/download-artifact@v8
        with:
          name: trx-results
          path: test-results

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040
        with:
          files: 'test-results/**/*.trx'
          check_name: NUnit Tests
          comment_mode: ${{ github.event_name == 'pull_request' && 'always' || 'off' }}
          job_summary: true
          fail_on: test failures
