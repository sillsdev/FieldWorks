name: Flex CI
on:
  push:
    branches: ["release/**", "main", "feature/PubSub"]
  pull_request:
    branches: ["release/**", "main", "feature/PubSub"]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  debug_build_and_test:
    name: Build Debug and run Tests
    runs-on: windows-latest
    steps:
      - name: Checkout Files
        uses: actions/checkout@v4
        id: checkout

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: | 
            5.0.x
          
      - name: Build Debug and run tests
        id: build_and_test
        shell: powershell
        run: .\test.ps1 -TestFilter "TestCategory!=LongRunning&TestCategory!=ByHand&TestCategory!=SmokeTest&TestCategory!=DesktopRequired" | tee-object -FilePath build.log

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@27d65e188ec43221b20d26de30f4892fad91df2f
        if: ${{ !cancelled() }}
        with:
          files: '**/*.trx'
          check_name: NUnit Tests
          comment_mode: always
          job_summary: true
          fail_on: test failures

      - uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./*.log
