name: Commit messages check
on:
  pull_request:
  workflow_call:

jobs:
  gitlint:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Lint git commit messages
      id: lint_commit_messages
      shell: pwsh
      run: ./Build/Agent/commit-messages.ps1
    - name: Propagate Error Summary
      id: commit_message_summary
      if: always()
      shell: pwsh
      run: |
        $resultsLogPath = 'check_results.log'
        if (Test-Path -LiteralPath $resultsLogPath) {
          $content = Get-Content -LiteralPath $resultsLogPath -Raw
          $commitUrl = 'https://github.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/commit/'
          $content = [regex]::Replace($content, 'Commit ([0-9a-f]{7,40})', {
            param($match)
            $sha = $match.Groups[1].Value
            return "[commit $sha]($commitUrl$sha)"
          })
          Set-Content -LiteralPath $resultsLogPath -Value $content -NoNewline
        }
        elseif ('${{ steps.lint_commit_messages.outcome }}' -eq 'success') {
          $content = 'No problems found.'
        }
        else {
          $content = 'Commit message checker failed before producing details.'
        }
        if ([string]::IsNullOrWhiteSpace($content) -and '${{ steps.lint_commit_messages.outcome }}' -eq 'success') {
          $content = 'No problems found.'
        }
        if ($env:GITHUB_STEP_SUMMARY) {
          Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Value $content
        }
        if ($env:GITHUB_OUTPUT) {
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value 'check_results<<###LINT_DELIMITER###'
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value $content
          Add-Content -LiteralPath $env:GITHUB_OUTPUT -Value '###LINT_DELIMITER###'
        }
    # add a comment on the PR if the commit message linting failed
    - name: Comment on PR
      if: steps.lint_commit_messages.outcome == 'failure'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: Commit Comment
        message: |
          [WARN] Commit message format issues
          ${{ steps.commit_message_summary.outputs.check_results }}
    - name: Clear PR Comment
      if: steps.lint_commit_messages.outcome == 'success'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: Commit Comment
        only_update: true
        hide: true
        hide_classify: "RESOLVED"
