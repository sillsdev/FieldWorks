# Dependabot configuration for FieldWorks
# Keeps GitHub Actions and other dependencies up-to-date

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "Chore"
    labels:
      - "dependencies"
    # Group minor/patch updates to reduce PR noise
    groups:
      actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "Chore"
    labels:
      - "dependencies"
    # Ignore major version bumps by default (breaking changes)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      nuget-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
